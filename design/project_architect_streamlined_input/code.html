<!DOCTYPE html>

<html class="dark" lang="en"><head>
<meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&amp;family=JetBrains+Mono&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#2b4bee",
                        "background-light": "#f6f6f8",
                        "background-dark": "#101322",
                    },
                    fontFamily: {
                        "display": ["Inter", "sans-serif"],
                        "mono": ["JetBrains Mono", "monospace"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.125rem",
                        "lg": "0.25rem",
                        "xl": "0.5rem",
                        "full": "0.75rem"
                    },
                },
            },
        }
    </script>
<style>
        .material-symbols-outlined {
            font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
    </style>
<title>Project Architect</title>
<style>
    body {
      min-height: max(884px, 100dvh);
    }
  </style>
</head>
<body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-slate-100 min-h-screen flex flex-col">
<!-- Top Navigation Bar -->
<nav class="flex items-center justify-between px-6 py-4 border-b border-primary/10 bg-background-light dark:bg-background-dark">
<div class="flex items-center gap-2">
<span class="material-symbols-outlined text-primary text-2xl">architecture</span>
<span class="font-bold tracking-tight text-lg">Project Architect</span>
</div>
<div class="flex items-center gap-4">
<button class="p-2 hover:bg-primary/10 rounded-lg transition-colors group">
<span class="material-symbols-outlined text-slate-600 dark:text-slate-400 group-hover:text-primary">settings</span>
</button>
</div>
</nav>
<!-- Main Content Area -->
<main class="flex-1 flex flex-col items-center justify-center px-4 py-12 @container">
<div class="w-full max-w-2xl flex flex-col gap-8">
<!-- Hero Section -->
<div class="text-center space-y-4">
<div class="inline-flex items-center justify-center p-3 bg-primary/10 rounded-xl mb-2">
<span class="material-symbols-outlined text-primary text-4xl">account_tree</span>
</div>
<h1 class="text-4xl @[480px]:text-5xl font-black tracking-tight text-slate-900 dark:text-white">
                    Project Architect
                </h1>
<p class="text-slate-600 dark:text-slate-400 text-base @[480px]:text-lg max-w-md mx-auto">
                    Enter your idea and let AI build your project structure.
                </p>
</div>
<!-- Input Section -->
<div class="space-y-6">
<div class="flex flex-col gap-2">
<label class="text-sm font-medium text-slate-500 dark:text-slate-400 uppercase tracking-wider ml-1">Project Idea</label>
<textarea class="w-full min-h-[180px] p-5 bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-xl focus:ring-2 focus:ring-primary focus:border-transparent transition-all outline-none font-mono text-base placeholder:text-slate-400 dark:placeholder:text-slate-600 resize-none" placeholder="e.g., solar system science project"></textarea>
</div>
<!-- Action Button -->
<button class="w-full h-14 bg-primary hover:bg-primary/90 text-white font-bold rounded-xl flex items-center justify-center gap-2 transition-all shadow-lg shadow-primary/20">
<span class="material-symbols-outlined">auto_awesome</span>
                    Generate Structure
                </button>
<!-- Advanced Options Section -->
<div class="pt-4 border-t border-slate-200 dark:border-slate-800">
<div class="p-4 rounded-xl bg-slate-100 dark:bg-slate-900/30 border border-slate-200 dark:border-slate-800/50">
<div class="flex items-center justify-between mb-4">
<div class="flex flex-col">
<span class="text-sm font-bold">Advanced Options</span>
<span class="text-xs text-slate-500 dark:text-slate-400">Configure additional parameters</span>
</div>
<label class="relative inline-flex items-center cursor-pointer">
<input checked="" class="sr-only peer" type="checkbox" value=""/>
<div class="w-11 h-6 bg-slate-300 dark:bg-slate-700 peer-focus:outline-none rounded-full peer peer-checked:after:translate-x-full rtl:peer-checked:after:-translate-x-full peer-checked:after:border-white after:content-[''] after:absolute after:top-[2px] after:start-[2px] after:bg-white after:border-gray-300 after:border after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-primary"></div>
</label>
</div>
<!-- Optional Gemini Field (shown when toggle is on) -->
<div class="animate-in fade-in slide-in-from-top-2 duration-300">
<label class="block text-xs font-bold text-slate-500 dark:text-slate-400 mb-2 ml-1 uppercase tracking-wider">Gemini API Key (Optional)</label>
<div class="relative">
<span class="material-symbols-outlined absolute left-4 top-1/2 -translate-y-1/2 text-slate-400 text-lg">key</span>
<input class="w-full h-11 pl-12 pr-4 bg-white dark:bg-slate-900/50 border border-slate-200 dark:border-slate-800 rounded-lg focus:ring-2 focus:ring-primary focus:border-transparent outline-none text-sm font-mono placeholder:text-slate-400 dark:placeholder:text-slate-600" placeholder="Enter your API key here" type="password"/>
</div>
</div>
</div>
</div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="py-8 px-6 text-center border-t border-slate-200 dark:border-slate-800 bg-background-light dark:bg-background-dark">
<div class="flex items-center justify-center gap-6 text-slate-400 dark:text-slate-600">
<a class="text-xs hover:text-primary transition-colors uppercase tracking-widest font-bold" href="#">Documentation</a>
<span class="w-1 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></span>
<a class="text-xs hover:text-primary transition-colors uppercase tracking-widest font-bold" href="#">GitHub</a>
<span class="w-1 h-1 bg-slate-300 dark:bg-slate-700 rounded-full"></span>
<a class="text-xs hover:text-primary transition-colors uppercase tracking-widest font-bold" href="#">API Reference</a>
</div>
</footer>
</body></html>
